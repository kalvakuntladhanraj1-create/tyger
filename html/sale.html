<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Legal Scrutiny Report</title>

<style>
body {
    font-family: "Segoe UI", Arial;
    background: #eef2f7;
    margin: 0;
}

.container {
    max-width: 1150px;
    margin: 30px auto;
    background: #fff;
    padding: 30px;
    border-radius: 10px;
}

h1 {
    text-align: center;
}

.section {
    margin-bottom: 25px;
}

.section h3 {
    background: #34495e;
    color: white;
    padding: 10px;
    border-radius: 6px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-top: 10px;
}

input {
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 6px;
    width: 100%;
}

button {
    width: 100%;
    padding: 12px;
    background: #2ecc71;
    color: white;
    border: none;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #27ae60;
}
</style>
</head>

<body>

<div class="container">

<h1>LEGAL SCRUTINY REPORT</h1>

<form action="/generate_sale" method="post">

<!-- BASIC -->
<div class="section">
<h3>Basic Details</h3>
<div class="grid">
<input name="APPLICATION_NO" placeholder="Application No">
<input type="date" name="DATE">
<input name="APPLICANT_NAME" placeholder="Applicant Name">
<input name="LOAN_AMOUNT" placeholder="Loan Amount">
<input name="APPLICANT_BOLD_OWNER" placeholder="Owner Name">
</div>
</div>

<!-- PROPERTY -->
<div class="section">
<h3>Property Details</h3>
<div class="grid">
<input name="DEED_NO" placeholder="Deed No">
<input type="date" name="DEED_DATE">
<input name="DOOR_NO" placeholder="Door No">

<input name="ASSESSMENT_NO" placeholder="Assessment No (UPPER)">
<input name="Assessment_No" placeholder="Assessment No (LOWER - IMPORTANT)">

<input name="SURVEY_NO" placeholder="Survey No">
<input name="PLOT_NO" placeholder="Plot No">
<input name="EXTENT_YARDS" placeholder="Extent Sq.Yards">
<input name="EXTENT_FEET" placeholder="Extent Sq.Feet">
</div>
</div>

<!-- LOCATION -->
<div class="section">
<h3>Location Details</h3>
<div class="grid">
<input name="ADDRESS" placeholder="Address">
<input name="VILLAGE" placeholder="Village">
<input name="GRAM_PANCHAYAT" placeholder="Gram Panchayat">
<input name="MANDAL" placeholder="Mandal">
<input name="DISTRICT" placeholder="District">
<input name="SRO" placeholder="SRO">
<input name="RO" placeholder="RO">
</div>
</div>

<!-- BOUNDARIES -->
<div class="section">
<h3>Boundaries</h3>
<div class="grid">
<input name="EAST_BOUNDARY" placeholder="East Boundary">
<input name="WEST_BOUNDARY" placeholder="West Boundary">
<input name="NORTH_BOUNDARY" placeholder="North Boundary">
<input name="SOUTH_BOUNDARY" placeholder="South Boundary">
</div>
</div>

<!-- MEASUREMENTS -->
<div class="section">
<h3>Measurements</h3>
<div class="grid">
<input name="E_W" placeholder="E-W (Yards)">
<input name="N_S" placeholder="N-S (Yards)">
<input name="E_W_FEET" placeholder="E-W (Feet)">
<input name="N_S_FEET" placeholder="N-S (Feet)">
</div>
</div>

<!-- DOCUMENT DETAILS -->
<div class="section">
<h3>Document Details</h3>
<div class="grid">
<input name="EXECUTANT_FULL" placeholder="Executant Name">
<input name="APPLICANT_OWNER_FULL" placeholder="Applicant Owner Full">
<input name="APPLICANT_FULL" placeholder="Applicant Full Name">
<input name="RELATION" placeholder="Relation">
<input name="WORTH" placeholder="Property Worth">
</div>
</div>

<!-- POSSESSION -->
<div class="section">
<h3>Possession & Tax</h3>
<div class="grid">
<input type="date" name="POSSESSION_DATE">
<input name="FROM_YEARS" placeholder="From Years">
<input name="POSSESSION_NAME" placeholder="Possession Name">

<input type="date" name="H_T_DATE">
<input name="HOUSE_TAX_RECIPT_NO" placeholder="House Tax Receipt No">
<input name="FINANCIAL_YEARS" placeholder="Financial Years">

<input name="HOUSE_TAX_NAME" placeholder="House Tax Name">
<input name="HOUSE_TAX_ISSUED_BY" placeholder="Issued By">
</div>
</div>

<!-- EC -->
<div class="section">
<h3>Encumbrance Certificate</h3>
<div class="grid">
<input type="date" name="EC_DATE">
<input name="EC_NO" placeholder="EC Number">
</div>
</div>

<button type="submit">Generate Report</button>

</form>

</div>

</body>
</html>
