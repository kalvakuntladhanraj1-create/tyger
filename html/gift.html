<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tyger Legal Scrutiny - Gift</title>

<style>
body { font-family: Arial; background:#f5f6fa; }
.container { max-width:1100px; margin:30px auto; background:#fff; padding:25px; border-radius:10px; }
h2 { border-bottom:2px solid #ddd; padding-bottom:5px; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:12px; }
input { padding:10px; border:1px solid #ccc; border-radius:5px; }
button { margin-top:25px; padding:14px; width:100%; background:#27ae60; color:white; border:none; border-radius:6px; }
</style>

</head>

<body>
<div class="container">

<h1>Tyger Legal Scrutiny Report - Gift</h1>

<form method="POST" action="/generate_gift">

<h2>Basic</h2>
<div class="grid">
<input name="DATE">
<input name="APPLICATION_NO">
<input name="APPLICANT_NAME">
<input name="LOAN_AMOUNT">
<input name="APPLICANT_BOLD_OWNER">
</div>

<h2>Property</h2>
<div class="grid">
<input name="DOOR_NO">
<input name="Assessment_No">
<input name="EXTENT_YARDS">
<input name="SURVEY_NO">
<input name="PLOT_NO">
<input name="ADDRESS">
<input name="VILLAGE">
<input name="GRAM_PANCHAYAT">
<input name="MANDAL">
<input name="SRO">
<input name="RO">
<input name="DISTRICT">
</div>

<h2>Boundaries</h2>
<div class="grid">
<input name="EAST_BOUNDARY">
<input name="WEST_BOUNDARY">
<input name="NORTH_BOUNDARY">
<input name="SOUTH_BOUNDARY">
</div>

<h2>Measurements</h2>
<div class="grid">
<input name="E_W">
<input name="N_S">
<input name="E_W_FEET">
<input name="N_S_FEET">
<input name="EXTENT_FEET">
</div>

<h2>Gift Details</h2>
<div class="grid">
<input name="DEED_TYPE">
<input name="DEED_NO">
<input name="DEED_DATE">
<input name="EXECUTANT_FULL">
<input name="APPLICANT_OWNER_FULL">
<input name="RELATION">
<input name="WORTH">
</div>

<h2>Documents</h2>
<div class="grid">
<input name="POSSESSION_DATE">
<input name="FROM_YEARS">
<input name="POSSESSION_NAME">
<input name="H_T_DATE">
<input name="HOUSE_TAX_RECIPT_NO">
<input name="FINANCIAL_YEARS">
<input name="HOUSE_TAX_NAME">
<input name="HOUSE_TAX_ISSUED_BY">
<input name="EC_DATE">
<input name="EC_NO">
</div>

<button type="submit">Generate Gift Report</button>

</form>
</div>
</body>
</html>
